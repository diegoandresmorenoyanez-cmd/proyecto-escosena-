!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Mundialista Pro</title>
    <style>
        /* Reseteo básico y tipografía */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #010811 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* CAPAS DE DETALLES PARA EL FONDO */
        
        /* Capa 1: Imagen del estadio real */
        .bg-stadium {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center;
            background-size: cover;
            opacity: 0.35;
            z-index: 1;
        }

        /* Capa 2: Patrón de líneas deportivas modernas */
        .bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 2;
        }

        /* Capa 3: Luces de energía/estadio (Animadas) */
        .bg-glows {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: pulseGlow 8s infinite ease-in-out alternate;
        }

        .glow-green {
            width: 400px;
            height: 400px;
            background: #28a745;
            top: -100px;
            right: -50px;
        }

        .glow-blue {
            width: 500px;
            height: 500px;
            background: #007bff;
            bottom: -150px;
            left: -100px;
            animation-delay: -4s;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            100% { transform: scale(1.2) translate(30px, 20px); opacity: 0.5; }
        }

        /* BARRA SUPERIOR (Encima del fondo) */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logos {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .logo-sena {
            width: 65px;
            height: auto;
        }

        .logo-propio {
            width: 65px;
            height: 65px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px dashed #28a745;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 11px;
            text-align: center;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .logo-propio:hover {
            background-color: rgba(40, 167, 69, 0.2);
            border-style: solid;
        }

        /* CONTENEDOR PRINCIPAL */
        main {
            position: relative;
            z-index: 10;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* TARJETA DE LOGIN CON EFECTO GLASSMORPHISM */
        .login-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 380px;
            color: #ffffff;
        }

        .login-container h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 26px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .login-container p.subtitle {
            text-align: center;
            color: #b0b8c4;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* FORMULARIO */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 13px;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            color: #fff;
            transition: all 0.3s;
        }

        .form-group input::placeholder {
            color: #718096;
        }

        .form-group input:focus {
            outline: none;
            border-color: #28a745;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.5);
        }

        /* BOTÓN */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #28a745, #218838);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .links {
            margin-top: 22px;
            text-align: center;
        }

        .links a {
            color: #52c46f;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #28a745;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="bg-stadium"></div>
    <div class="bg-pattern"></div>
    <div class="bg-glows">
        <div class="glow glow-green"></div>
        <div class="glow glow-blue"></div>
    </div>

    <header>
        <div class="logos">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Sena_Colombia_logo.svg" alt="Logo SENA" class="logo-sena">
            
            <div class="logo-propio">
               <img src="WhatsApp Image 2026-06-04 at 1.27.34 PM.jpeg" alt="Logo SENA" class="logo-sena">
            </div>
        </div>
    </header>

    <main>
        <div class="login-container">
            <h2>Portal Mundialista</h2>
            <p class="subtitle">Accede al análisis y noticias del torneo</p>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="username">Usuario o Correo</label>
                    <input type="text" id="username" name="username" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-login">INGRESAR</button>
                
                <div class="links">
                    <a href="#">¿Problemas para iniciar sesión?</a>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
